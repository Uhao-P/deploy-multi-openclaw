# OpenClaw Multi-Instance Docker Deployment (A–Z, 26 instances)
#
# Port scheme: Instance N → Gateway 40N00, Bridge 40N01
# All ports in range 40100–42601 (well within 1–65535).
#
# Usage:
#   cp .env.example .env   # edit tokens and settings
#   bash setup.sh           # init dirs, fix perms, seed configs
#   docker compose up -d    # start all instances

x-openclaw-common: &openclaw-common
  image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
  init: true
  restart: unless-stopped

x-openclaw-env: &openclaw-env
  HOME: /home/node
  TERM: xterm-256color

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  # ============================================================
  # Instance A — ports 40100/40101
  # ============================================================
  openclaw-a:
    <<: *openclaw-common
    container_name: openclaw-a
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_A_GATEWAY_TOKEN}
      TZ: ${TZ:-UTC}
      TELEGRAM_BOT_TOKEN: ${OPENCLAW_A_TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${OPENCLAW_A_DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${OPENCLAW_A_SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${OPENCLAW_A_SLACK_APP_TOKEN:-}
      OPENAI_API_KEY: ${OPENCLAW_A_OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${OPENCLAW_A_ANTHROPIC_API_KEY:-}
    volumes:
      - ./instances/a/config:/home/node/.openclaw
      - ./instances/a/workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_A_GATEWAY_PORT:-40100}:18789"
      - "${OPENCLAW_A_BRIDGE_PORT:-40101}:18790"
    command:
      [
        "node", "dist/index.js", "gateway",
        "--bind", "${OPENCLAW_A_GATEWAY_BIND:-lan}",
        "--port", "18789",
      ]
    healthcheck:
      <<: *healthcheck
      test:
        [
          "CMD", "node", "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  openclaw-a-cli:
    <<: *openclaw-common
    container_name: openclaw-a-cli
    network_mode: "service:openclaw-a"
    restart: "no"
    cap_drop: [NET_RAW, NET_ADMIN]
    security_opt: ["no-new-privileges:true"]
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_A_GATEWAY_TOKEN}
      TZ: ${TZ:-UTC}
      BROWSER: echo
    volumes:
      - ./instances/a/config:/home/node/.openclaw
      - ./instances/a/workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-a:
        condition: service_healthy
    profiles: ["cli"]

